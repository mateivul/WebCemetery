<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1f0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Tombstone -->
  <path d="M 40 35 Q 40 25, 50 25 L 78 25 Q 88 25, 88 35 L 88 95 Q 88 100, 83 100 L 45 100 Q 40 100, 40 95 Z" 
        fill="#4a5a4a" stroke="#2d5a2d" stroke-width="2"/>
  
  <!-- Inner shadow on tombstone -->
  <path d="M 45 30 Q 45 27, 50 27 L 78 27 Q 83 27, 83 30 L 83 95 L 45 95 Z" 
        fill="#5a6a5a" opacity="0.3"/>
  
  <!-- RIP text -->
  <text x="64" y="55" font-family="serif" font-size="20" font-weight="bold" 
        fill="#b0c4b0" text-anchor="middle">RIP</text>
  
  <!-- Decorative lines -->
  <line x1="50" y1="65" x2="78" y2="65" stroke="#b0c4b0" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="75" x2="78" y2="75" stroke="#b0c4b0" stroke-width="1" opacity="0.3"/>
  
  <!-- Ground/grass -->
  <rect x="35" y="100" width="58" height="8" fill="#2d5a2d" opacity="0.6"/>
  
  <!-- Small cross on tombstone -->
  <rect x="62" y="80" width="4" height="12" fill="#b0c4b0" opacity="0.7" rx="1"/>
  <rect x="58" y="83" width="12" height="4" fill="#b0c4b0" opacity="0.7" rx="1"/>
</svg>
